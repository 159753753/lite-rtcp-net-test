[mode]
udp_1=true
udp_1_2=false
udp_1_2_tcp_1=false

[config]
mtu=900
mtu_tcp=100
bandwidth_udp_1_0=2000
bandwidth_udp_2_0=250
bandwidth_udp_2_1=250
bandwidth_tcp_1_0=10

[addr]
; for local testing (discard)
; addr=127.0.0.1
; For cross-machine: sender binds to addr_send, receiver binds to addr_recv,
; sender sends to addr_recv.  If unset, both fall back to addr.
addr_send=169.254.1.1
addr_recv=169.254.51.16
; addr_send=192.168.5.48
; addr_recv=192.168.22.123

[address_from]
udp_1_0_addr_from=10100
udp_2_0_addr_from=10102
udp_2_1_addr_from=10104
tcp_1_0_addr_from=10000

[address_to]
udp_1_0_addr_to=10110
udp_2_0_addr_to=10112
udp_2_1_addr_to=10114
tcp_1_0_addr_to=10010

; [address_recv]
; udp_1_0_addr_to=5000
; udp_2_0_addr_to=5002
; udp_2_1_addr_to=5004
; tcp_1_0_addr_to=4900
